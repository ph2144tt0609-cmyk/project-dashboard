<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f5f6f8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15161a" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="進捗">
<title>プロジェクト進捗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --line:#e7e8ec; --text:#16181d; --sub:#646a78; --hint:#9aa0ad;
  --accent:#1d9e75; --accent-soft:#e3f4ee;
  --shadow:0 1px 2px rgba(20,24,33,.04), 0 4px 16px rgba(20,24,33,.05);
  --shadow-hover:0 2px 6px rgba(20,24,33,.06), 0 10px 28px rgba(20,24,33,.10);
  --green-bg:#E1F5EE; --green-fg:#0F6E56; --blue-bg:#E6F1FB; --blue-fg:#0C447C;
  --amber-bg:#FAEEDA; --amber-fg:#854F0B; --gray-bg:#F1EFE8; --gray-fg:#5F5E5A;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#15161a; --card:#1e2026; --line:#2c2f38; --text:#eceef2; --sub:#9aa0ad; --hint:#6b7280;
    --accent:#34c08e; --accent-soft:#13312a;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.35);
    --shadow-hover:0 2px 6px rgba(0,0,0,.4), 0 12px 30px rgba(0,0,0,.5);
    --green-bg:#0F6E5633; --green-fg:#5DCAA5; --blue-bg:#0C447C33; --blue-fg:#85B7EB;
    --amber-bg:#854F0B33; --amber-fg:#EF9F27; --gray-bg:#5F5E5A33; --gray-fg:#B4B2A9; }
}
*{box-sizing:border-box}
html{scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px;border:3px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:var(--sub);}
a:focus-visible,button:focus-visible,input:focus-visible,.stat:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:"Inter","Noto Sans JP",-apple-system,"Segoe UI",Roboto,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.wrap{max-width:900px;margin:0 auto;padding:24px 18px 72px;}
/* 合言葉ゲート */
#gate{min-height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#gate .glogo{width:48px;height:48px;border-radius:15px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
#gate .glogo svg{width:26px;height:26px;fill:#fff;}
#gate h1{font-size:21px;font-weight:600;margin:0;letter-spacing:.01em;}
#gate p{color:var(--sub);font-size:14px;margin:0;}
#gate input{width:262px;height:46px;font-size:16px;padding:0 14px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--text);text-align:center;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;}
#gate input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
#gate button{height:46px;padding:0 26px;font-size:15px;font-weight:600;border:none;border-radius:12px;
  background:var(--accent);color:#fff;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s,filter .15s;}
#gate button:hover{filter:brightness(1.05);}
#gate button:active{transform:scale(.97)}
#err{color:#c0392b;font-size:13px;height:16px;}
/* ヘッダー */
header{display:flex;flex-wrap:wrap;align-items:center;gap:10px 12px;margin:2px 0 4px;}
header .brand{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:var(--shadow);}
header .brand svg{width:19px;height:19px;fill:#fff;}
header h1{font-size:22px;font-weight:700;margin:0;letter-spacing:.01em;}
header .gen{font-size:12px;color:var(--hint);}
.logout{margin-left:auto;font-size:12px;color:var(--hint);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px 12px;cursor:pointer;transition:color .15s,border-color .15s;}
.logout:hover{color:var(--text);border-color:var(--sub);}
/* 統計（クリックでフィルタ） */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:18px 0 24px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,box-shadow .15s,border-color .15s;}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.stat.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),var(--shadow);}
.stat .n{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.15;}
.stat .l{font-size:12px;color:var(--sub);margin-top:2px;}
.healthbar{display:flex;gap:2px;height:9px;margin:2px 0 22px;}
.healthbar span{display:block;}
.healthbar span:first-child{border-top-left-radius:999px;border-bottom-left-radius:999px;}
.healthbar span:last-child{border-top-right-radius:999px;border-bottom-right-radius:999px;}
.filterbar{font-size:13px;color:var(--sub);margin:-10px 0 16px;}
.filterbar a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600;}
.filterbar a:hover{text-decoration:underline;}
.empty{text-align:center;padding:46px 16px 40px;color:var(--sub);}
.empty-ic{width:56px;height:56px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:var(--shadow);}
.empty-ic svg{width:26px;height:26px;fill:none;stroke:var(--accent);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.empty-t{font-size:15px;font-weight:600;color:var(--text);}
.empty-link{display:inline-block;margin-top:12px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;text-decoration:none;}
.empty-link:hover{text-decoration:underline;}
/* カテゴリ＆カード */
.cat{font-size:13px;font-weight:600;color:var(--sub);margin:18px 0 12px;letter-spacing:.03em;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0 9px;}
.cat::after{content:"";flex:1;height:1px;background:var(--line);}
.cat .cnt{font-size:11px;font-weight:600;color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:1px 9px;line-height:1.7;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .15s;position:relative;overflow:hidden;animation:cardIn .28s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid .card:nth-child(2){animation-delay:.03s}
.grid .card:nth-child(3){animation-delay:.06s}
.grid .card:nth-child(4){animation-delay:.09s}
.grid .card:nth-child(n+5){animation-delay:.12s}
@media (prefers-reduced-motion:reduce){.card{animation:none}}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.card.is-today::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card .nm{font-weight:600;font-size:15px;letter-spacing:.01em;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.card .goal{font-size:13px;color:var(--sub);margin-top:7px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card .meta{font-size:12px;color:var(--hint);margin-top:10px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 0 3px var(--accent-soft);}
.card ul{margin:9px 0 0;padding-left:16px;}
.card li{font-size:12px;color:var(--text);margin:2px 0;line-height:1.5;}
.open{display:inline-flex;align-items:center;gap:5px;margin-top:11px;font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;background:var(--accent-soft);border-radius:999px;padding:5px 12px;white-space:nowrap;transition:filter .15s,transform .1s;}
.open:hover{filter:brightness(.96);}
.open:active{transform:scale(.97);}
.foot{margin-top:36px;font-size:11px;color:var(--hint);text-align:center;}
@media (max-width:560px){
  .stats{grid-template-columns:repeat(3,1fr);gap:8px;}
  .stat{padding:11px 12px;border-radius:12px;}
  .stat .n{font-size:22px;}
  .grid{grid-template-columns:1fr;}
  header h1{font-size:20px;}
}
</style>
</head>

  <div id="gate">
    <div class="glogo"><svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10 5 15a7 7 0 0 0 14 0c0-5-7-13-7-13z"/></svg></div>

    <button id="go">表示する</button>
    <div id="err"></div>
  </div>
  <div id="app" style="display:none"></div>
</div>

const COLORS = {
  "稼働中":"green","公開運用中":"green","自動運用中":"green","公開・改善中":"green",
  "公開済":"green","提出済":"green","完成":"green","開発中":"blue","準備中":"amber","要確認":"gray"
};
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pass){
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b2u(ENC.salt), iterations:ENC.iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b2u(ENC.iv)}, key, b2u(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

function daysLabel(d){
  if(d===null||d===undefined) return "";
  if(d<=0) return "今日";
  if(d===1) return "昨日";
  return d + "日前";
}

let DATA = null;
let curFilter = "all";

const FILTER_LABEL = { today: "今日動いた", green: "稼働中", blue: "開発中", amberGray: "準備・要確認" };

function matchFilter(p){
  if(curFilter === "all") return true;
  if(curFilter === "today") return p.today;
  const c = COLORS[p.status] || "gray";
  if(curFilter === "green") return c === "green";
  if(curFilter === "blue") return c === "blue";
  if(curFilter === "amberGray") return c === "amber" || c === "gray";
  return true;
}

function relTime(s){
  const m = String(s).match(/(\d+)-(\d+)-(\d+)\s+(\d+):(\d+)/);
  if(!m) return s;
  const d = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5]);
  const diff = (Date.now() - d.getTime())/1000;
  if(diff < 0) return "たった今";
  if(diff < 60) return "たった今";
  if(diff < 3600) return Math.floor(diff/60) + "分前";
  if(diff < 86400) return Math.floor(diff/3600) + "時間前";
  return Math.floor(diff/86400) + "日前";
}
function render(){
  const data = DATA, s = data.stats;
  let h = '<header><span class="brand"><svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10 5 15a7 7 0 0 0 14 0c0-5-7-13-7-13z"/></svg></span><h1>プロジェクト進捗</h1>'
        + '<span class="gen" title="最終更新 ' + esc(data.generated) + '">更新 ' + esc(relTime(data.generated)) + '</span>'
        + '<button class="logout" id="logout">ロック</button></header>';
  h += '<div class="stats">'
     + stat(s.total,"全体","all") + stat(s.moved,"今日動いた","today",s.moved>0) + stat(s.green,"稼働中","green")
     + stat(s.blue,"開発中","blue") + stat(s.amber+s.gray,"準備・要確認","amberGray") + '</div>';
  const seg = (w,c,l) => w>0 ? '<span style="flex:'+w+';background:'+c+'" title="'+esc(l)+'"></span>' : '';
  h += '<div class="healthbar" aria-hidden="true">'
     + seg(s.green,"var(--green-fg)","稼働中 "+s.green)
     + seg(s.blue,"var(--blue-fg)","開発中 "+s.blue)
     + seg(s.amber+s.gray,"var(--amber-fg)","準備・要確認 "+(s.amber+s.gray))
     + '</div>';
  if(curFilter !== "all"){
    h += '<div class="filterbar">' + esc(FILTER_LABEL[curFilter]) + 'のみ表示中　<a id="clearf">すべて表示</a></div>';
  }
  let shown = 0;
  for(const cat of data.categories){
    const projs = cat.projects.filter(matchFilter);
    if(!projs.length) continue;
    shown += projs.length;
    h += '<div class="cat"><span>' + esc(cat.name) + '</span><span class="cnt">' + projs.length + '</span></div><div class="grid">';
    for(const p of projs){
      const c = COLORS[p.status] || "gray";
      let meta = "";
      const dl = daysLabel(p.last_days);
      if(p.today) meta = '<span class="dot"></span>今日更新';
      else if(dl) meta = '最終 ' + dl;
      let commits = "";
      if(p.commits && p.commits.length){
        commits = '<ul>' + p.commits.map(m => '<li>' + esc(m) + '</li>').join('') + '</ul>';
      }
      const link = p.url ? '<div><a class="open" href="' + esc(p.url) + '" target="_blank" rel="noopener">サイトを開く ↗</a></div>' : '';
      h += '<div class="card'+(p.today?' is-today':'')+'"><div class="top">'
         + '<span class="nm">' + esc(p.name) + '</span>'
         + '<span class="badge" style="background:var(--'+c+'-bg);color:var(--'+c+'-fg)">' + esc(p.status) + '</span>'
         + '</div><div class="goal" title="' + esc(p.goal) + '">' + esc(p.goal) + '</div>'
         + (meta ? '<div class="meta">' + meta + '</div>' : '')
         + commits + link + '</div>';
    }
    h += '</div>';
  }
  if(shown === 0){
    h += '<div class="empty"><div class="empty-ic"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div><div class="empty-t">' + (curFilter==="today" ? "今日はまだ更新がありません" : "該当するプロジェクトはありません") + '</div><a class="empty-link" id="clearf2">すべて表示</a></div>';
  }
  h += '<div class="foot">合言葉で暗号化して公開 / 毎晩21時に自動更新</div>';
  const app = document.getElementById("app");
  app.innerHTML = h;
  document.getElementById("gate").style.display = "none";
  app.style.display = "block";
  document.getElementById("logout").onclick = () => { sessionStorage.removeItem("dashpass"); location.reload(); };
  app.querySelectorAll(".stat[data-f]").forEach((el) => {
    const act = () => { const f = el.getAttribute("data-f"); curFilter = (curFilter === f ? "all" : f); render(); };
    el.onclick = act;
    el.onkeydown = (e) => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); act(); } };
  });
  const cf = document.getElementById("clearf");
  if(cf) cf.onclick = () => { curFilter = "all"; render(); };
  const cf2 = document.getElementById("clearf2");
  if(cf2) cf2.onclick = () => { curFilter = "all"; render(); };
}
function stat(n,l,key,accent){
  const cls = "stat" + (curFilter === key ? " active" : "");
  const nst = accent ? ' style="color:var(--accent)"' : '';
  return '<div class="'+cls+'" data-f="'+key+'" tabindex="0" role="button"><div class="n"'+nst+'>'+n+'</div><div class="l">'+esc(l)+'</div></div>';
}

async function tryPass(pass, fromStore){
  try{
    const data = await decrypt(pass);
    sessionStorage.setItem("dashpass", pass);
    DATA = data; render();
  }catch(e){
    if(!fromStore){ document.getElementById("err").textContent = "合言葉が違います"; }
    sessionStorage.removeItem("dashpass");
  }
}
document.getElementById("go").onclick = () => tryPass(document.getElementById("pw").value, false);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") tryPass(e.target.value, false); });
const saved = sessionStorage.getItem("dashpass");
if(saved) tryPass(saved, true);
</script>
