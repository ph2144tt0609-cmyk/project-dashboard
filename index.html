<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>プロジェクト進捗</title>
<style>
:root{
  --bg:#f6f6f4; --card:#ffffff; --line:#e8e8e4; --text:#1a1a1a; --sub:#6b6b66; --hint:#9a9a93;
  --green-bg:#E1F5EE; --green-fg:#0F6E56; --blue-bg:#E6F1FB; --blue-fg:#0C447C;
  --amber-bg:#FAEEDA; --amber-fg:#854F0B; --gray-bg:#F1EFE8; --gray-fg:#5F5E5A;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#1c1c1a; --card:#26262320; --card:#262623; --line:#37372f; --text:#ececec; --sub:#a8a8a0; --hint:#76766e;
    --green-bg:#0F6E5633; --green-fg:#5DCAA5; --blue-bg:#0C447C33; --blue-fg:#85B7EB;
    --amber-bg:#854F0B33; --amber-fg:#EF9F27; --gray-bg:#5F5E5A33; --gray-fg:#B4B2A9; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;line-height:1.6;}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 60px;}
/* 合言葉ゲート */
#gate{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#gate h1{font-size:20px;font-weight:600;margin:0;}
#gate p{color:var(--sub);font-size:14px;margin:0;}
#gate input{width:240px;height:42px;font-size:16px;padding:0 12px;border:1px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--text);text-align:center;}
#gate button{height:42px;padding:0 22px;font-size:15px;border:none;border-radius:10px;
  background:#1d9e75;color:#fff;cursor:pointer;}
#gate button:active{transform:scale(.98)}
#err{color:#c0392b;font-size:13px;height:16px;}
/* 本体 */
header{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:6px;}
header h1{font-size:21px;font-weight:600;margin:0;}
header .gen{font-size:12px;color:var(--hint);}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 24px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:84px;}
.stat .n{font-size:22px;font-weight:600;}
.stat .l{font-size:12px;color:var(--sub);}
.cat{font-size:14px;font-weight:600;color:var(--sub);margin:26px 0 10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.card .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.card .nm{font-weight:600;font-size:15px;}
.badge{font-size:11px;padding:2px 9px;border-radius:9px;white-space:nowrap;}
.card .goal{font-size:13px;color:var(--sub);margin-top:6px;}
.card .meta{font-size:12px;color:var(--hint);margin-top:8px;display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#1d9e75;display:inline-block;}
.card ul{margin:7px 0 0;padding-left:16px;}
.card li{font-size:12px;color:var(--text);margin:1px 0;}
.foot{margin-top:30px;font-size:11px;color:var(--hint);}
.logout{margin-left:auto;font-size:12px;color:var(--hint);background:none;border:none;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate">
    <h1>プロジェクト進捗</h1>
    <p>合言葉を入力してください</p>
    <input id="pw" type="password" autocomplete="off" inputmode="text" placeholder="合言葉">
    <button id="go">表示する</button>
    <div id="err"></div>
  </div>
  <div id="app" style="display:none"></div>
</div>

const COLORS = {
  "稼働中":"green","公開運用中":"green","自動運用中":"green","公開・改善中":"green",
  "公開済":"green","提出済":"green","完成":"green","開発中":"blue","準備中":"amber","要確認":"gray"
};
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pass){
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b2u(ENC.salt), iterations:ENC.iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b2u(ENC.iv)}, key, b2u(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

function daysLabel(d){
  if(d===null||d===undefined) return "";
  if(d<=0) return "今日";
  if(d===1) return "昨日";
  return d + "日前";
}

function render(data){
  const s = data.stats;
  let h = '<header><h1>プロジェクト進捗</h1>'
        + '<span class="gen">最終更新 ' + esc(data.generated) + '</span>'
        + '<button class="logout" id="logout">ロック</button></header>';
  h += '<div class="stats">'
     + stat(s.total,"全体") + stat(s.moved,"今日動いた") + stat(s.green,"稼働中")
     + stat(s.blue,"開発中") + stat(s.amber+s.gray,"準備・要確認") + '</div>';
  for(const cat of data.categories){
    h += '<div class="cat">' + esc(cat.name) + '</div><div class="grid">';
    for(const p of cat.projects){
      const c = COLORS[p.status] || "gray";
      let meta = "";
      const dl = daysLabel(p.last_days);
      if(p.today) meta = '<span class="dot"></span>今日更新';
      else if(dl) meta = '最終 ' + dl;
      let commits = "";
      if(p.commits && p.commits.length){
        commits = '<ul>' + p.commits.map(m => '<li>' + esc(m) + '</li>').join('') + '</ul>';
      }
      h += '<div class="card"><div class="top">'
         + '<span class="nm">' + esc(p.name) + '</span>'
         + '<span class="badge" style="background:var(--'+c+'-bg);color:var(--'+c+'-fg)">' + esc(p.status) + '</span>'
         + '</div><div class="goal">' + esc(p.goal) + '</div>'
         + (meta ? '<div class="meta">' + meta + '</div>' : '')
         + commits + '</div>';
    }
    h += '</div>';
  }
  h += '<div class="foot">合言葉で暗号化して公開 / 毎晩21時に自動更新</div>';
  document.getElementById("app").innerHTML = h;
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("logout").onclick = () => { sessionStorage.removeItem("dashpass"); location.reload(); };
}
function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>'; }

async function tryPass(pass, fromStore){
  try{
    const data = await decrypt(pass);
    sessionStorage.setItem("dashpass", pass);
    render(data);
  }catch(e){
    if(!fromStore){ document.getElementById("err").textContent = "合言葉が違います"; }
    sessionStorage.removeItem("dashpass");
  }
}
document.getElementById("go").onclick = () => tryPass(document.getElementById("pw").value, false);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") tryPass(e.target.value, false); });
const saved = sessionStorage.getItem("dashpass");
if(saved) tryPass(saved, true);
</script>
